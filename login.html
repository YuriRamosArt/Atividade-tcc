<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="STYLE/header.css">
    <link rel="stylesheet" href="./STYLE/stylelogin.css">
    <title>Login</title>
  </head>

<body>

  <!-- HEADER AQUI -->
  <header>
    <div class="top-bar">
      frete gratis
    </div>

    <div class="main-header">
      <div class="left">
        <div class="menu-icon">☰</div>
        <img src="logo.png" class="logo">

        <nav>
          <a href="#">categorias</a>
          <a href="#">promoções</a>
          <a href="#">suplementos</a>
        </nav>
      </div>

      <div class="right">
        <div class="search-box">
          <input type="text" placeholder="Pesquisar...">
        </div>

        <div class="icons">
          <img src="IMAGENS/CARRINHO.png" class="icon">
          <img src="IMAGENS/LOGIN.png" class="icon">
        </div>
  </header>

<!--LOGIN-->

</body>
  <div class="login-card">
    <img src="IMAGENS/image.png" class="image">

    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Digite seu email">
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha">
      </div>
      
      <button class="login-button">Entrar</button>
    </form>
    <div class="extra">
      <a href="EsqueceuaSenha.html">Esqueceu a senha?</a>
    </div>
    
    <div class="cadastro">
      <a href="cadastrar.html">Não tem uma conta? Cadastrar</a>    
    </div> 
  </div>
    
</body>
</html>
