<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Acessórios</title>
    <link rel="stylesheet" href="./STYLE/styleAcessórios.css">
</head>
<body>
    <!-- Card de Acessórios -->
    <section><!-- Imagem de Acessórios -->
        <img class="acessorios" src="IMAGENS/acessórios.png" alt="acessorios">
        <div class="card_coqueteleira">  <!--Card de coqueteleira-->
            <div>
                <img class="coqueteleira" src="IMAGENS/coqueteleira.png" alt="coqueteleira">
            </div>
            <div class="descricao_coqueteleira">
            <h1 class="titulo_coqueteleira">DARKLAB- coqueteleira - 900ml</h1>
            <p class="preco_coqueteleira">R$69,99</p>
            </div>
            <div>
           <img class="carrinho_coqueteleira" src="./IMAGENS/carrinho.png" alt="carrinho">
           <h1 class="compra_coqueteleira">comprar</h1>
            </div>
        <div>
        <div class="card_garrafa">  <!--Card de garrafa-->
            <div>
                <img class="garrafa" src="IMAGENS/garrafaGrande.png" alt="garrafa">
            </div>
            <div class="descricao_garrafa">
            <h1 class="titulo_garrafa">DARKLAB- garrafa - 500ml</h1>
            <p class="preco_garrafa">R$39,99</p>
            </div>
            <div>
           <img class="carrinho_garrafa" src="./IMAGENS/carrinho.png" alt="carrinho">
           <h1 class="compra_garrafa">comprar</h1>
            </div>
                 <div class="card_mochila">
                      <div> 
                    <img src="./IMAGENS/mochilaG.png" alt="mochila" class="mochila">
                </div> <!--Imagem da mochila-->
                <div class="descricao_mochila">
                      <h1 class="titulo_mochila">GROWT sacochila-média</h1>
                    <p class="preco_mochila">R$149,99</p>
                </div><!--Descrição da mochila-->
                    <div>
                        <img class="carrinho_mochila" src="./IMAGENS/carrinho.png" alt="carrinho">
                        <h1 class="compra_mochila">comprar</h1>
                    </div>
                 </div>  <!--Card da mochila-->
            </div>
        </div>
    </section> <!--Card de acessórios de cima-->
        <section>
           <div class="card_bone"><!--Card do boné-->
                <div>
                    <img class="bone" src="./IMAGENS/bone.png" alt="bone">
                </div>
                <div class="descricao_bone"><!--Descrição do boné-->
                    <h1 class="titulo_bone">SHARKPRO-boné - 1un</h1>
                    <p class="preco_bone">R$49,99</p>
                </div>
                <div>
                    <img class="carrinho_bone" src="./IMAGENS/carrinho.png" alt="carrinho">
                    <h1 class="compra_bone">comprar</h1>
                </div><!--Fim do card do boné-->
                
                <div class="card_elastico"><!--Card do elástico-->
                    <div>
                        <img class="elastico" src="./IMAGENS/elastico.png" alt="elastico">
                    </div>
                    <div class="descricao_elastico"><!--Descrição do elástico-->
                        <h1 class="titulo_elastico">SHARKPRO-elástico - 1un</h1>
                        <p class="preco_elastico">R$29,99</p>
                    </div>
                    <div>
                        <img class="carrinho_elastico" src="./IMAGENS/carrinho.png" alt="carrinho">
                        <h1 class="compra_elastico">comprar</h1>
                    </div><!--Fim do card do elástico-->

                    <div class="card_strap"><!--Card do strap-->
                        <div>
                            <img class="strap" src="./IMAGENS/strap.png" alt="strap">
                        </div>
                        
                        <div class="descricao_strap"><!--Descrição do strap-->
                            <h1 class="titulo_strap">DARKLAB strap- 1 par </h1>
                            <p class="preco_strap">R$29,99</p>
                    </div>
                    <div>
                        <img class="carrinho_strap" src="./IMAGENS/carrinho.png" alt="carrinho">
                        <h1 class="compra_strap">comprar</h1>
                    </div><!--Fim do card do strap-->

                </div>
           </div>
        </section>
</body>
</html>
