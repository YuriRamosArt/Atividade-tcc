<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Acessórios</title>
    <link rel="stylesheet" href="./STYLE/styleAcessórios.css">
</head>
<body>
    <!-- Card de Acessórios -->
    <section><!-- Imagem de Acessórios -->
        <img class="acessorios" src="IMAGENS/acessórios.png" alt="acessorios">
        <div class="card_coqueteleira">  <!--Card de coqueteleira-->
            <div>
                <img class="coqueteleira" src="IMAGENS/coqueteleira.png" alt="coqueteleira">
            </div>
            <div class="descricao_coqueteleira">
            <h1 class="titulo_coqueteleira">DARKLAB- coqueteleira - 900ml</h1>
            <p class="preco_coqueteleira">R$69,99</p>
            </div>
            <div>
           <img class="carrinho_coqueteleira" src="./IMAGENS/carrinho.png" alt="carrinho">
           <h1 class="compra_coqueteleira">comprar</h1>
            </div>
        <div>
        <div class="card_garrafa">  <!--Card de garrafa-->
            <div>
                <img class="garrafa" src="IMAGENS/garrafaGrande.png" alt="garrafa">
            </div>
            <div class="descricao_garrafa">
            <h1 class="titulo_garrafa">DARKLAB- garrafa - 500ml</h1>
            <p class="preco_garrafa">R$39,99</p>
            </div>
            <div>
           <img class="carrinho_garrafa" src="./IMAGENS/carrinho.png" alt="carrinho">
           <h1 class="compra_garrafa">comprar</h1>
            </div>
        </div>
        </div>
    </section>
</body>
</html>
