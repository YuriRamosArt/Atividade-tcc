<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="STYLE/header.css">
    <link rel="stylesheet" href="STYLE/cadastro.css">
    <title>Cadastrar</title>
</head>

<body>
    <!-- HEADER AQUI -->
  <header>
    <div class="top-bar">
      frete gratis
    </div>

    <div class="main-header">
      <div class="left">
        <img src="logo.png" class="logo">
        <img src="IMAGENS/MENU.png" class="menu-icon">

        <nav>
          <a href="#">categorias</a>
          <a href="#">promoções</a>
          <a href="#">suplementos</a>
        </nav>
      </div>

      <div class="right">
        <div class="search-box">
          <img src="IMAGENS/Search.png" class="lupa">
          <input type="text" placeholder="Pesquisar...">
        </div>

        <div class="icons">
          <img src="IMAGENS/CARRINHO.png" class="icon">
          <img src="IMAGENS/LOGIN.png" class="icon">
        </div>
  </header>
</body>
<body>
    <div class="card">
        <h2>Cadastrar</h2>
        <form>
            <div class="input-group">
                <label>Nome</label>
                <input type="text" placeholder="Seu nome">
            </div>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Seu email">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="Crie uma senha">
            </div>

            <div class="input-group">
                <label>Confirmar senha</label>
                <input type="password" placeholder="Repita a senha">
            </div>

            <button>Cadastrar</button>
        </form>

        <div class="login-link">
            Já tem uma conta? <a href="login.html">Entrar</a>
        </div>
    </div>
</body>
</html>
